  description: "Module 3 — Metrics, cross-validation, and model performance"
  page-footer:
    left: "Cal Poly Pomona · Applied Machine Learning"
    right: "Built with [Quarto](https://quarto.org)"
  navbar:
    background: "#FFB81C"
    foreground: "white"
    title: "M03 — Evaluation & Resampling"
    right:
      - href: index.qmd
        text: Home
      - href: slides.qmd
        text: Slides
      - href: we03_eval_resamp_codebook.qmd
